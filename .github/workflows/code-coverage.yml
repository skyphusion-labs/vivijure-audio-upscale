name: code-coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write
  code-quality: write
  pull-requests: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install coverage==7.10.7 pytest==9.1.1
      - name: Run CPU surface tests with coverage
        run: coverage run -m pytest -q tests/
      - run: coverage xml
      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: ./coverage.xml
          language: python
