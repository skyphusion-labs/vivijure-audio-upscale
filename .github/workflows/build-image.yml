name: build-image

# ============================================================================
# HEAVY-RUNNER VARIANT -- DO NOT MERGE until GitHub Enterprise is live.
# ============================================================================
# This is the GitHub-hosted LARGER-runner version of the fleet build, staged on
# branch ci/heavy-runner-ready for next-week migration of the 3 GPU repos.
#
# Difference from main: `runs-on` moves OFF the org self-hosted fleet pool ONTO a
# GitHub-hosted larger runner. That is fork-safe BY CONSTRUCTION -- a GitHub-hosted
# runner is an ephemeral VM owned by GitHub, so even if a workflow ever did run for
# an outside fork it could not touch our fleet, our network, or any persistent disk.
# (We also keep ZERO pull_request triggers, so a fork PR still executes nothing.)
#
# PREREQUISITE (blocks this file from running): the label below must exist as an
# org-level GitHub-hosted larger runner created under Enterprise
# (Org -> Settings -> Actions -> Runners -> New GitHub-hosted runner). Until that
# runner exists, a job targeting this label sits QUEUED forever and is never picked
# up -- same failure shape as a dangling binding: typecheck/lint won't catch it,
# only a real run will. Confirm the runner is live before merging to main.
#
# Sizing: ubuntu-22.04-4core = 4 vCPU / 16 GB RAM / 150 GB SSD. The 150 GB OS disk
# is ample headroom for the ~8.79 GB final image plus the CUDA base + intermediate
# layers (the self-hosted fleet build runs fine on far less), so NO host disk-reclaim
# dance is needed here. We keep the docker prune + post-push image removal anyway for
# parity with the fleet workflow and as cheap hygiene. Bump to ubuntu-22.04-8core
# (8 vCPU / 32 GB / 300 GB SSD) ONLY if build wall-clock becomes the bottleneck; the
# build is mostly base-image-pull and GHCR-push bound (network), so more cores buy
# little and double the per-minute spend.
#
# GHCR auth: unchanged -- built-in GITHUB_TOKEN, scoped to packages: write here only.
#
# Runner: a GitHub-hosted larger runner (label MUST be created in org Actions settings
# under Enterprise; see header). On a public repo this DOES bill per-minute -- standard
# 2-core hosted runners are free for public repos, larger runners are NOT.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - requirements.txt
      - .github/workflows/build-image.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # NOTE: org-created GitHub-hosted larger runner label (Enterprise). Must exist
    # before this runs; a missing label leaves the job QUEUED indefinitely.
    runs-on: ubuntu-22.04-4core
    timeout-minutes: 240
    env:
      IMAGE: ghcr.io/skyphusion-labs/vivijure-audio-upscale
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free dangling images + log in to GHCR
        run: |
          docker image prune -f || true
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: docker build -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA}" .

      - name: Push image
        run: |
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA}"

      - name: Remove local image to free runner disk
        if: always()
        run: docker image rm "$IMAGE:latest" "$IMAGE:${GITHUB_SHA}" || true
