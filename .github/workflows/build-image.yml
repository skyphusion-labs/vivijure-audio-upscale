name: build-image

# Build the vivijure-audio-upscale RunPod serverless image and push it to GHCR.
#
# Unified image workflow (mirrors the slate image.yml shape): a pushed SemVer tag
# (v0.1.0) publishes the immutable, pinnable release image tagged with the clean
# version (0.1.0), the major.minor (0.1), and the short commit sha (sha-abc1234).
# There is NO :latest -- a RunPod endpoint template pins an explicit :version so a
# re-provision is deterministic (re-pinning the endpoint is a separate, deliberate,
# spend-gated step). A push to main that touches the image inputs still BUILDS the
# image as a smoke but does NOT push it; only a pushed version tag (or a manual
# workflow_dispatch) publishes to GHCR. A bare merge to main never publishes.
#
# Before this unification audio-upscale built on push-to-main only and published
# :latest + a full sha, so it never cut a pinnable version -- the sibling parity gap
# S1 closes.
#
# Runner: GitHub-hosted ubuntu-latest. This repo is PUBLIC, so per the standing runner
# policy (public repos -> GitHub-hosted, fork-safe; private/internal -> the org fleet
# pool) the build runs in the hosted sandbox, NOT on the self-hosted fleet. The CUDA
# base (runpod/pytorch cu1281) is a tens-of-GB build; ubuntu-latest ships with only
# ~14GB free, so the "Free disk space" step below reclaims ~25-30GB of preinstalled
# toolchains this image never uses (the same pattern proven in vivijure-backend). Without
# it the docker build blows the runner disk.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - requirements.txt
      - .github/workflows/build-image.yml
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Inline sync (not workflow_call): public repos cannot call reusable workflows in
  # internal fleet-chezmoi (workflow validation fails with 0 jobs).
  sync-gpu-allowlist:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fleet-chezmoi (sync script)
        uses: actions/checkout@v4
        with:
          repository: skyphusion-labs/fleet-chezmoi
          ref: main
          token: ${{ secrets.RUNNER_GROUP_ADMIN_TOKEN }}

      - name: Sync vivijure-gpu-builds allowlist
        env:
          GH_TOKEN: ${{ secrets.RUNNER_GROUP_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          bash scripts/sync-vivijure-gpu-builds-allowlist.sh \
            --apply \
            --ensure-tag "vivijure-audio-upscale" "${{ github.ref_name }}"

  build:
    needs: sync-gpu-allowlist
    if: always() && (needs.sync-gpu-allowlist.result == 'success' || needs.sync-gpu-allowlist.result == 'skipped')
    runs-on: [self-hosted, gpu]
    timeout-minutes: 240
    env:
      IMAGE: ghcr.io/skyphusion-labs/vivijure-audio-upscale
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Assert commit is on main (no publish of an unreviewed release)
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::commit $GITHUB_SHA is not on origin/main; refusing to publish an unreviewed release"
            exit 1
          fi

      - name: Free disk space (hosted runners only; Plane C has TB-class disk)
        if: runner.environment == 'github-hosted'
        run: |
          set -eu
          echo "--- before ---"; df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo docker image prune -af || true
          echo "--- after ---"; df -h /

      - name: Log in to GHCR
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build image
        # Plain docker build (not build-push-action/buildx): host prep rewrites the LOCAL
        # runpod/pytorch tag; buildx re-resolves the registry digest and bypasses prep
        # (fc#754 cryptography footgun). Matches vivijure-musetalk build-image.yml.
        run: |
          ARGS=""
          for t in ${{ steps.meta.outputs.tags }}; do ARGS="$ARGS -t $t"; done
          docker build $ARGS .

      - name: Push image
        # Publish ONLY on a version tag or a deliberate workflow_dispatch; a bare
        # merge to main builds the image above as a smoke but never pushes it.
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        run: |
          for t in ${{ steps.meta.outputs.tags }}; do docker push "$t"; done

      - name: Remove local image to free runner disk
        if: always()
        run: |
          for t in ${{ steps.meta.outputs.tags }}; do docker image rm "$t" || true; done
